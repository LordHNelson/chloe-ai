<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe AI</title>

<style>
body {
  margin:0;
  background:#11131a;
  color:white;
  font-family:system-ui, sans-serif;
}

header {
  padding:18px;
  font-size:28px;
  font-weight:800;
  border-bottom:1px solid #2a2d3a;
  position:sticky;
  top:0;
  background:#11131a;
  z-index:10;
  display:flex;
  justify-content: space-between;
  align-items:center;
  gap: 12px;
}

#status {
  font-size:13px;
  background:#222638;
  padding:7px 12px;
  border-radius:999px;
  white-space: nowrap;
}

#chat {
  height:40vh;
  overflow-y:auto;
  padding:16px;
  border-bottom:1px solid #2a2d3a;
  background:#151824;
}

.row {
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:10px 0;
}

.row.userRow {
  justify-content:flex-end;
}

.avatar {
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  background:#252a3d;
  flex-shrink:0;
  border:2px solid #8b6cff;
}

.msg {
  max-width:84%;
  padding:13px 15px;
  border-radius:16px;
  white-space:pre-wrap;
  line-height:1.45;
}

.user {
  background:#8b6cff;
}

.chloe {
  background:#252a3d;
}

.system {
  margin:12px auto;
  color:#aaa;
  text-align:center;
  font-size:14px;
}

.suggestion {
  margin:12px auto;
  background:#173b2d;
  border:1px solid #20a46b;
  color:#e9fff5;
}

.generated-image {
  width:100%;
  height:auto;
  border-radius:16px;
  margin-top:12px;
  display:block;
}

#controls {
  padding:12px;
  border-top:1px solid #2a2d3a;
  background:#151824;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

textarea, input, select {
  width:100%;
  box-sizing:border-box;
  margin-bottom:8px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#262b3d;
  color:white;
  font-size:16px;
}

textarea {
  min-height:80px;
  resize: vertical;
}

button {
  padding:11px 13px;
  margin:4px 4px 4px 0;
  border:none;
  border-radius:12px;
  background:#8b6cff;
  color:white;
  font-weight:700;
  cursor: pointer;
}

button.secondary {
  background:#262b3d;
}

button.danger {
  background:#4b2630;
}

button.upgrade {
  background:#20a46b;
}

#upgradePanel {
  display:none;
  border-top:1px solid #2a2d3a;
  margin-top:10px;
  padding-top:10px;
}

pre {
  white-space:pre-wrap;
  background:#0c0e14;
  padding:12px;
  border-radius:14px;
  max-height:260px;
  overflow-y:auto;
  font-size:13px;
}

/* Gallery Styles */
#galleryContainer {
  margin-top: 12px;
  background: #1c2030;
  padding: 12px;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
}

#galleryControls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

#tagFilter, #categoryFilter {
  background: #262b3d;
  border-radius: 8px;
  border: none;
  padding: 8px 12px;
  color: white;
  min-width: 140px;
}

#imageGallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  max-height: 320px;
  overflow-y: auto;
  border-radius: 12px;
  background: #11131a;
  padding: 8px;
}

.gallery-item {
  position: relative;
  cursor: pointer;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 0.25s ease;
  display: flex;
  flex-direction: column;
  background: #252a3d;
}

.gallery-item.selected {
  border-color: #8b6cff;
}

.gallery-image {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-bottom: 1px solid #454f67;
}

.gallery-info {
  padding: 6px 8px;
  font-size: 12px;
  color: #ccc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.gallery-tags {
  margin-top: 2px;
  font-size: 10px;
  color: #8b6cff;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.gallery-tag {
  margin-right: 6px;
}

/* Scrollbar for gallery */
#imageGallery::-webkit-scrollbar {
  height: 6px;
}

#imageGallery::-webkit-scrollbar-thumb {
  background-color: #8b6cff99;
  border-radius: 4px;
}

#imageGallery::-webkit-scrollbar-track {
  background: transparent;
}

.gallery-fullscreen-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(17, 19, 26, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: zoom-out;
}

.gallery-fullscreen-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 16px;
  box-shadow: 0 0 20px #8b6cffaa;
}

</style>
</head>

<body>

<header>
  <div>Chloe AI</div>
  <span id="status">Online</span>
</header>

<div id="chat"></div>

<div id="galleryContainer">
  <div id="galleryControls">
    <input type="text" id="tagFilter" placeholder="Filter by tags (comma separated)..." title="Enter comma-separated tags to filter images by tags">
    <select id="categoryFilter" title="Filter images by category">
      <option value="all">All Categories</option>
    </select>
  </div>
  <div id="imageGallery" title="Generated images gallery (click to view)"></div>
</div>

<div id="controls">
  <select id="personality">
    <option value="balanced">Balanced Chloe</option>
    <option value="warmer">Warmer Chloe</option>
    <option value="playful">Playful Chloe</option>
    <option value="technical">Technical Chloe</option>
    <option value="direct">Direct Chloe</option>
    <option value="flirty">Flirty Chloe</option>
  </select>

  <textarea id="message" placeholder="Talk to Chloe..."></textarea>

  <input id="imageUrl" placeholder="Optional image URL for Chloe to analyse">
  <input id="imagePrompt" placeholder="Describe an image for Chloe to generate">

  <button onclick="sendMessage()">Send</button>
  <button onclick="manualGenerateImage()">Generate Image</button>
  <button class="secondary" onclick="setLastImageAsAvatar()">Use Last Image as Avatar</button>
  <button class="secondary" onclick="editMemory()">Memory</button>
  <button class="secondary" onclick="exportChat()">Export</button>
  <button class="upgrade" onclick="toggleUpgradePanel()">Upgrade Chloe</button>
  <button class="upgrade" onclick="suggestUpgrade()">Suggest Upgrade</button>
  <button class="danger" onclick="clearChat()">Clear</button>

  <div id="upgradePanel">
    <textarea id="upgradeRequest" placeholder="Describe the upgrade Chloe should make to her own code..."></textarea>
    <button class="upgrade" onclick="proposeUpgrade()">Propose Upgrade</button>
    <button class="upgrade" onclick="applyUpgrade()">Approve & Apply</button>
    <pre id="upgradePreview">No proposal yet.</pre>
  </div>
</div>

<script>
const API = "https://chloe-ai-af3m.onrender.com";

const chat = document.getElementById("chat");
const messageBox = document.getElementById("message");
const imageUrlBox = document.getElementById("imageUrl");
const imagePromptBox = document.getElementById("imagePrompt");
const personalityBox = document.getElementById("personality");
const statusBox = document.getElementById("status");
const upgradePanel = document.getElementById("upgradePanel");
const upgradeRequestBox = document.getElementById("upgradeRequest");
const upgradePreview = document.getElementById("upgradePreview");

const galleryContainer = document.getElementById("galleryContainer");
const imageGallery = document.getElementById("imageGallery");
const tagFilterInput = document.getElementById("tagFilter");
const categoryFilterSelect = document.getElementById("categoryFilter");

let history = loadHistory();
let memory = localStorage.getItem("chloe_memory") || "";
let personality = localStorage.getItem("chloe_personality") || "balanced";
let lastImagePrompt = localStorage.getItem("chloe_last_image_prompt") || "";
let chloeAvatar = localStorage.getItem("chloe_avatar") || "";
let lastGeneratedImage = localStorage.getItem("chloe_last_generated_image") || "";
let lastUpgradeProposal = null;

// Gallery image store: array of objects { image:string, prompt:string, tags:[], category:string, timestamp:number }
let galleryImages = loadGalleryImages();

personalityBox.value = personality;

personalityBox.addEventListener("change", () => {
  personality = personalityBox.value;
  localStorage.setItem("chloe_personality", personality);
  addMessage("system", "Personality changed to: " + personalityBox.options[personalityBox.selectedIndex].text);
});

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem("chloe_history") || "[]");
  } catch {
    return [];
  }
}

function saveHistory() {
  const trimmed = history.slice(-20);
  history = trimmed;

  try {
    localStorage.setItem("chloe_history", JSON.stringify(trimmed));
  } catch {
    localStorage.removeItem("chloe_history");
    history = [];
    addMessage("system", "Storage was full, so old chat history was cleared.");
  }
}

function loadGalleryImages() {
  try {
    return JSON.parse(localStorage.getItem("chloe_gallery_images") || "[]");
  } catch {
    return [];
  }
}

function saveGalleryImages() {
  try {
    localStorage.setItem("chloe_gallery_images", JSON.stringify(galleryImages));
  } catch {
    // If storage full, clear gallery and warn
    galleryImages = [];
    localStorage.removeItem("chloe_gallery_images");
    addMessage("system", "Storage was full, gallery images reset.");
  }
}

function defaultAvatarSvg() {
  return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"100\" height=\"100\">
      <rect width=\"100\" height=\"100\" rx=\"50\" fill=\"#252a3d\"/>
      <text x=\"50\" y=\"58\" font-size=\"42\" text-anchor=\"middle\" fill=\"#8b6cff\">C</text>
    </svg>
  `);
}

function addMessage(role, text, image=null) {
  if (role === "system" || role === "suggestion") {
    const div = document.createElement("div");
    div.className = role === "suggestion" ? "msg suggestion" : "msg system";
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  const row = document.createElement("div");
  row.className = role === "user" ? "row userRow" : "row";

  if (role !== "user") {
    const avatar = document.createElement("img");
    avatar.className = "avatar";
    avatar.src = chloeAvatar || defaultAvatarSvg();
    row.appendChild(avatar);
  }

  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "chloe");
  div.textContent = text;

  if (image) {
    const img = document.createElement("img");
    img.src = image;
    img.className = "generated-image";
    div.appendChild(img);
  }

  row.appendChild(div);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function typeIntoBubble(div, text) {
  div.textContent = "";
  const chunks = String(text || "").match(/.{1,4}/g) || [text];

  for (const chunk of chunks) {
    div.textContent += chunk;
    chat.scrollTop = chat.scrollHeight;
    await new Promise(r => setTimeout(r, 14));
  }
}

function renderHistory() {
  chat.innerHTML = "";
  history.forEach(m => addMessage(m.role, m.content, m.image || null));
}

function rememberLastImagePrompt(prompt) {
  lastImagePrompt = prompt;
  localStorage.setItem("chloe_last_image_prompt", prompt);
}

function setLastImageAsAvatar() {
  if (!lastGeneratedImage) {
    addMessage("system", "No generated image available yet.");
    return;
  }

  chloeAvatar = lastGeneratedImage;
  localStorage.setItem("chloe_avatar", chloeAvatar);
  addMessage("system", "Chloe avatar updated.");
  renderHistory();
}

// --- Gallery functions ---

function addImageToGallery(imageData) {
  // imageData = { image:string, prompt:string, tags:[], category:string, timestamp:number }
  galleryImages.unshift(imageData); // newest first
  saveGalleryImages();
  updateCategoryFilters();
  renderGallery();
}

function updateCategoryFilters() {
  const existingOptions = Array.from(categoryFilterSelect.options).map(o => o.value);
  const categories = new Set(galleryImages.map(img => img.category || "Uncategorized"));

  // Remove all options except 'all'
  for (let i = categoryFilterSelect.options.length - 1; i >= 0; i--) {
    if (categoryFilterSelect.options[i].value !== "all") {
      categoryFilterSelect.remove(i);
    }
  }

  // Add categories sorted
  Array.from(categories).sort().forEach(cat => {
    if (cat && !existingOptions.includes(cat)) {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      categoryFilterSelect.appendChild(option);
    }
  });
}

function renderGallery() {
  const tagFilterText = tagFilterInput.value.trim().toLowerCase();
  const tagFilterTags = tagFilterText ? tagFilterText.split(",").map(t => t.trim()).filter(t => t) : [];
  const categoryFilter = categoryFilterSelect.value;

  imageGallery.innerHTML = "";

  let filtered = galleryImages;

  if (categoryFilter !== "all") {
    filtered = filtered.filter(img => (img.category || "Uncategorized") === categoryFilter);
  }

  if (tagFilterTags.length > 0) {
    filtered = filtered.filter(img => {
      if (!img.tags || !Array.isArray(img.tags)) return false;
      return tagFilterTags.every(tag => img.tags.some(t => t.toLowerCase().includes(tag)));
    });
  }

  if (filtered.length === 0) {
    const noItem = document.createElement("div");
    noItem.textContent = "No images found for selected filters.";
    noItem.style.color = "#999";
    noItem.style.padding = "12px";
    imageGallery.appendChild(noItem);
    return;
  }

  filtered.forEach((imgData, index) => {
    const item = document.createElement("div");
    item.className = "gallery-item";
    item.title = imgData.prompt || "Image";
    
    // Show image
    const img = document.createElement("img");
    img.className = "gallery-image";
    img.src = imgData.image;
    img.alt = imgData.prompt || "Generated image";
    item.appendChild(img);

    // Show prompt or category
    const info = document.createElement("div");
    info.className = "gallery-info";
    const timeStr = new Date(imgData.timestamp).toLocaleDateString();
    info.textContent = (imgData.category || "Uncategorized") + " - " + timeStr;
    item.appendChild(info);

    // Tags
    if (imgData.tags && imgData.tags.length > 0) {
      const tagsDiv = document.createElement("div");
      tagsDiv.className = "gallery-tags";
      imgData.tags.forEach(t => {
        const tSpan = document.createElement("span");
        tSpan.className = "gallery-tag";
        tSpan.textContent = `#${t}`;
        tagsDiv.appendChild(tSpan);
      });
      item.appendChild(tagsDiv);
    }

    // Click handler - fullscreen view
    item.addEventListener("click", () => showFullscreenImage(imgData));

    imageGallery.appendChild(item);
  });
}

function showFullscreenImage(imgData) {
  const overlay = document.createElement("div");
  overlay.className = "gallery-fullscreen-overlay";
  overlay.title = imgData.prompt || "Full view image";

  const img = document.createElement("img");
  img.src = imgData.image;
  img.alt = imgData.prompt || "Generated image fullscreen";

  overlay.appendChild(img);

  overlay.addEventListener("click", () => {
    document.body.removeChild(overlay);
  });

  document.body.appendChild(overlay);
}

// Filters change events
categoryFilterSelect.addEventListener("change", renderGallery);
tagFilterInput.addEventListener("input", () => {
  // Debounce the filtering to avoid excessive renders
  clearTimeout(tagFilterInput._filterTimeout);
  tagFilterInput._filterTimeout = setTimeout(() => renderGallery(), 300);
});

// Initial gallery rendering
updateCategoryFilters();
renderGallery();

// --- Existing code ---

function isImageIntent(text) {
  return /\b(generate|create|make|draw|picture|image|photo|artwork|illustration|render|show me|visualise|visualize)\b/i.test(text || "");
}

function isUpgradeIntent(text) {
  return /\b(upgrade|improve|enhance|update|modify|change your code|edit your code|self upgrade|self-upgrade|better ui|better memory|add feature|fix yourself)\b/i.test(text || "");
}

async function decideAction(message) {
  const res = await fetch(API + "/decide-action", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      message,
      history,
      memory,
      personality: personalityBox.value,
      lastImagePrompt
    })
  });

  return await res.json();
}

async function sendMessage() {
  const message = messageBox.value.trim();
  const imageUrl = imageUrlBox.value.trim();

  if (!message && !imageUrl) return;

  messageBox.value = "";

  const shownMessage = imageUrl ? `${message || "Analyse this image."}\n${imageUrl}` : message;

  history.push({ role:"user", content:shownMessage });
  addMessage("user", shownMessage);
  saveHistory();

  statusBox.textContent = "Deciding...";

  try {
    const decision = await decideAction(message || "Analyse this image.");

    if (decision.action === "image" || decision.action === "chat_and_image" || decision.action === "retry_image") {
      if (decision.reply) {
        const replyBubble = addMessage("chloe", "Thinking...");
        await typeIntoBubble(replyBubble, decision.reply);
        history.push({ role:"chloe", content:decision.reply });
        saveHistory();
      }

      const prompt =
        decision.action === "retry_image"
          ? lastImagePrompt
          : decision.imagePrompt || imagePromptBox.value.trim() || message;

      if (!prompt) {
        addMessage("system", "No image prompt available.");
        statusBox.textContent = "Online";
        return;
      }

      await generateImageFromPrompt(prompt, true);
      statusBox.textContent = "Online";
      return;
    }

    if (decision.action === "upgrade") {
      const reply = decision.reply || "I can prepare that upgrade for approval.";
      const replyBubble = addMessage("chloe", "Thinking...");
      await typeIntoBubble(replyBubble, reply);
      history.push({ role:"chloe", content:reply });
      saveHistory();

      openUpgradePanel(decision.upgradeRequest || message);
      await proposeUpgrade(decision.upgradeRequest || message);
      statusBox.textContent = "Online";
      return;
    }

    statusBox.textContent = "Thinking...";
    const bubble = addMessage("chloe", "Thinking...");

    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message,
        imageUrl,
        history,
        memory,
        personality: personalityBox.value
      })
    });

    const data = await res.json();
    const reply = data.reply || "No response returned.";

    await typeIntoBubble(bubble, reply);

    history.push({ role:"chloe", content:reply });
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function manualGenerateImage() {
  const prompt = imagePromptBox.value.trim() || messageBox.value.trim();

  if (!prompt) {
    addMessage("system", "Add an image prompt first.");
    return;
  }

  await generateImageFromPrompt(prompt, false);
}

async function generateImageFromPrompt(prompt, auto=false) {
  const cleanPrompt = String(prompt || "").trim();

  if (!cleanPrompt) {
    addMessage("system", "No image prompt available.");
    return;
  }

  rememberLastImagePrompt(cleanPrompt);

  if (auto) {
    addMessage("system", "Chloe decided an image would help.");
  }

  addMessage("user", auto ? "Chloe visualised: " + cleanPrompt : "Generate image: " + cleanPrompt);

  statusBox.textContent = "Generating image...";
  const bubble = addMessage("chloe", "Creating image...");

  try {
    const res = await fetch(API + "/generate-image", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        prompt: cleanPrompt,
        personality: personalityBox.value
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    bubble.textContent = auto ? "I thought this would help 👇" : "Here’s what I made 👇";

    const img = document.createElement("img");
    img.src = data.image;
    img.className = "generated-image";
    bubble.appendChild(img);

    lastGeneratedImage = data.image;
    localStorage.setItem("chloe_last_generated_image", data.image);

    if (!chloeAvatar) {
      chloeAvatar = data.image;
      localStorage.setItem("chloe_avatar", chloeAvatar);
      addMessage("system", "Chloe avatar set from generated image.");
    }

    // Add to chat history
    history.push({
      role:"chloe",
      content:auto ? "I thought this would help." : "Image generated.",
      image:data.image
    });
    saveHistory();

    // Try to extract tags and category from prompt
    const { tags, category } = extractTagsAndCategory(cleanPrompt);

    addImageToGallery({
      image: data.image,
      prompt: cleanPrompt,
      tags: tags,
      category: category,
      timestamp: Date.now()
    });

    statusBox.textContent = "Online";
  } catch (err) {
    bubble.textContent = "Image error: " + err.message;
    statusBox.textContent = "Online";
  }
}

// Basic heuristic to extract tags and category from prompt string
function extractTagsAndCategory(prompt) {
  let tags = [];
  let category = "Uncategorized";

  // Extract tags: words preceded by # or after words like 'tags:'
  const hashTagMatches = prompt.match(/#(\w+)/g);
  if (hashTagMatches) {
    tags = hashTagMatches.map(t => t.slice(1).toLowerCase());
  } else {
    // Try looking for "tags:" pattern
    const tagsMatch = prompt.match(/tags?: ?([^.;\n]+)[.;\n]?/i);
    if (tagsMatch) {
      tags = tagsMatch[1].split(/[, ]+/).map(t => t.trim().toLowerCase()).filter(t => t);
    }
  }

  // Try to infer category from prompt keywords
  const lowered = prompt.toLowerCase();
  if (lowered.includes("portrait")) category = "Portraits";
  else if (lowered.includes("landscape")) category = "Landscape";
  else if (lowered.includes("animal")) category = "Animals";
  else if (lowered.includes("fantasy") || lowered.includes("myth")) category = "Fantasy";
  else if (lowered.includes("abstract")) category = "Abstract";
  else if (lowered.includes("nature")) category = "Nature";
  else if (lowered.includes("architecture") || lowered.includes("building")) category = "Architecture";

  return { tags, category };
}

function toggleUpgradePanel() {
  upgradePanel.style.display =
    upgradePanel.style.display === "none" || !upgradePanel.style.display
      ? "block"
      : "none";
}

function openUpgradePanel(requestText = "") {
  upgradePanel.style.display = "block";
  if (requestText) upgradeRequestBox.value = requestText;
}

async function suggestUpgrade() {
  statusBox.textContent = "Thinking of an upgrade...";

  try {
    const res = await fetch(API + "/suggest-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        history,
        memory,
        personality: personalityBox.value
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const text = `Suggested upgrade: ${data.title}\n\nWhy: ${data.reason}\n\nRequest: ${data.request}`;

    addMessage("suggestion", text);
    openUpgradePanel(data.request);

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Upgrade suggestion error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function proposeUpgrade(optionalRequest = "") {
  const request = String(optionalRequest || upgradeRequestBox.value || "").trim();

  if (!request) {
    addMessage("system", "Describe the upgrade first.");
    return;
  }

  upgradeRequestBox.value = request;
  statusBox.textContent = "Planning upgrade...";
  upgradePreview.textContent = "Chloe is preparing an upgrade proposal...";

  try {
    const res = await fetch(API + "/propose-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ request })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    lastUpgradeProposal = data;
    upgradePreview.textContent = JSON.stringify(data, null, 2);

    history.push({
      role:"chloe",
      content:"Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it."
    });

    addMessage("chloe", "Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it.");
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    upgradePreview.textContent = "Upgrade proposal error: " + err.message;
    addMessage("chloe", "Upgrade proposal error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function applyUpgrade() {
  if (!lastUpgradeProposal) {
    addMessage("system", "No upgrade proposal to apply.");
    return;
  }

  const ok = confirm("Approve this upgrade and commit it to GitHub?");
  if (!ok) return;

  statusBox.textContent = "Applying upgrade...";

  try {
    const res = await fetch(API + "/apply-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(lastUpgradeProposal)
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    history.push({
      role:"chloe",
      content:"Upgrade committed. Render deploy has been triggered. Refresh in a minute or two."
    });

    addMessage("chloe", "Upgrade committed. Render deploy has been triggered. Refresh in a minute or two.");
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Apply upgrade error: " + err.message);
    statusBox.textContent = "Online";
  }
}

function editMemory() {
  const updated = prompt("Chloe memory:", memory);

  if (updated !== null) {
    memory = updated;
    localStorage.setItem("chloe_memory", memory);
    addMessage("system", "Memory updated.");
  }
}

function clearChat() {
  history = [];
  localStorage.removeItem("chloe_history");
  renderHistory();
}

function exportChat() {
  const text = history.map(m => `${m.role}: ${m.content}`).join("\n\n");

  navigator.clipboard.writeText(text)
    .then(() => addMessage("system", "Chat copied to clipboard."))
    .catch(() => addMessage("system", "Could not copy chat."));
}

setInterval(() => {
  fetch(API + "/").catch(() => {});
}, 10 * 60 * 1000);

// Init
renderHistory();
</script>
