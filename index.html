<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe AI</title>
  <style>
    body {
      margin: 0;
      background: #11131a;
      color: white;
      font-family: system-ui, sans-serif;
    }
    header {
      padding: 18px 20px;
      font-size: 30px;
      font-weight: 800;
      border-bottom: 1px solid #2a2d3a;
      background: #11131a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #status {
      float: right;
      font-size: 14px;
      background: #222638;
      padding: 8px 14px;
      border-radius: 999px;
      margin-top: 4px;
    }
    #chat {
      height: 48vh;
      overflow-y: auto;
      padding: 18px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 84%;
      margin: 12px 0;
      padding: 14px 16px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
    }
    .user {
      margin-left: auto;
      background: #8b6cff;
    }
    .chloe {
      margin-right: auto;
      background: #252a3d;
    }
    .system {
      margin: 12px auto;
      background: transparent;
      color: #aaa;
      text-align: center;
      font-size: 14px;
    }
    .suggestion {
      margin: 12px auto;
      background: #173b2d;
      border: 1px solid #20a46b;
      color: #e9fff5;
    }
    .generated-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      margin-top: 12px;
      display: block;
      object-fit: contain;
    }
    #controls {
      padding: 14px;
      border-top: 1px solid #2a2d3a;
      background: #151824;
    }
    textarea, input, select {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      background: #262b3d;
      color: white;
      font-size: 16px;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      margin: 4px 4px 4px 0;
      background: #8b6cff;
      color: white;
      font-size: 15px;
      font-weight: 700;
    }
    button.secondary {
      background: #262b3d;
    }
    button.danger {
      background: #4b2630;
    }
    button.upgrade {
      background: #20a46b;
    }
    #upgradePanel {
      display: none;
      border-top: 1px solid #2a2d3a;
      padding-top: 10px;
      margin-top: 10px;
    }
    #imagePromptBuilder {
      background: #1a1c2a;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    #imagePromptBuilder h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #8b6cff;
    }
    #imagePromptBuilder label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #ccc;
    }
    #imagePromptBuilder input, #imagePromptBuilder select, #imagePromptBuilder textarea {
      margin-bottom: 12px;
      background: #262b3d;
      color: white;
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 12px;
      border: none;
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }
    #buildImagePromptButton {
      background: #20a46b;
      padding: 12px;
      font-weight: 700;
      font-size: 16px;
      border-radius: 14px;
      cursor: pointer;
      border: none;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <header>
    Chloe AI
    <span id="status">Online</span>
  </header>

  <div id="chat"></div>

  <div id="controls">
    <select id="personality">
      <option value="balanced">Balanced Chloe</option>
      <option value="warmer">Warmer Chloe</option>
      <option value="playful">Playful Chloe</option>
      <option value="technical">Technical Chloe</option>
      <option value="direct">Direct Chloe</option>
    </select>

    <textarea id="message" placeholder="Talk to Chloe..."></textarea>

    <input id="imageUrl" placeholder="Optional image URL for Chloe to analyse">

    <div id="imagePromptBuilder">
      <h3>Image Generation Prompt Builder</h3>
      <label for="subjectInput">Subject</label>
      <input id="subjectInput" type="text" placeholder="What is the main subject?">

      <label for="styleInput">Style</label>
      <select id="styleInput">
        <option value="">(none)</option>
        <option>Photorealistic</option>
        <option>Watercolor</option>
        <option>Oil painting</option>
        <option>Pixel art</option>
        <option>Cyberpunk</option>
        <option>Minimalist</option>
        <option>Impressionist</option>
        <option>Surreal</option>
        <option>Comic</option>
        <option>Vintage</option>
      </select>

      <label for="moodInput">Mood</label>
      <select id="moodInput">
        <option value="">(none)</option>
        <option>Happy</option>
        <option>Mysterious</option>
        <option>Dreamy</option>
        <option>Dark</option>
        <option>Cheerful</option>
        <option>Romantic</option>
        <option>Energetic</option>
        <option>Calm</option>
      </select>

      <label for="subtletyInput">Subtlety</label>
      <select id="subtletyInput">
        <option value="medium">Medium</option>
        <option value="low">Low (very subtle)</option>
        <option value="high">High (more explicit detail)</option>
      </select>

      <label for="suggestivenessInput">Suggestiveness</label>
      <select id="suggestivenessInput">
        <option value="medium">Medium</option>
        <option value="low">Low (tasteful, avoid suggestive)</option>
        <option value="high">High (allow artistic suggestiveness)</option>
      </select>

      <label for="otherInput">Other Parameters</label>
      <textarea id="otherInput" placeholder="Add anything else (colors, lighting, background, etc.)"></textarea>

      <button id="buildImagePromptButton">Build Image Prompt</button>

      <textarea id="imagePrompt" placeholder="Generated image prompt" readonly style="height: 70px; background: #333546; color: #ddd;"></textarea>
    </div>

    <button onclick="sendMessage()">Send</button>
    <button onclick="manualGenerateImage()">Generate Image</button>
    <button class="secondary" onclick="editMemory()">Memory</button>
    <button class="secondary" onclick="exportChat()">Export</button>
    <button class="upgrade" onclick="toggleUpgradePanel()">Upgrade Chloe</button>
    <button class="upgrade" onclick="suggestUpgrade()">Suggest Upgrade</button>
    <button class="danger" onclick="clearChat()">Clear</button>

    <div id="upgradePanel">
      <textarea id="upgradeRequest" placeholder="Describe the upgrade Chloe should make to her own code..."></textarea>
      <button class="upgrade" onclick="proposeUpgrade()">Propose Upgrade</button>
      <button class="upgrade" onclick="applyUpgrade()">Approve & Apply</button>
      <pre id="upgradePreview">No proposal yet.</pre>
    </div>
  </div>

  <script>
    const API_ROOT = "https://chloe-ai-af3m.onrender.com";

    const BACKEND_URL = API_ROOT + "/chat";
    const IMAGE_URL = API_ROOT + "/generate-image";
    const SUGGEST_UPGRADE_URL = API_ROOT + "/suggest-upgrade";
    const PROPOSE_UPGRADE_URL = API_ROOT + "/propose-upgrade";
    const APPLY_UPGRADE_URL = API_ROOT + "/apply-upgrade";
    const PING_URL = API_ROOT + "/";

    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("message");
    const imageBox = document.getElementById("imageUrl");
    const imagePromptBox = document.getElementById("imagePrompt");
    const personalityBox = document.getElementById("personality");
    const statusBox = document.getElementById("status");
    const upgradePanel = document.getElementById("upgradePanel");
    const upgradeRequestBox = document.getElementById("upgradeRequest");
    const upgradePreview = document.getElementById("upgradePreview");
    
    const subjectInput = document.getElementById("subjectInput");
    const styleInput = document.getElementById("styleInput");
    const moodInput = document.getElementById("moodInput");
    const subtletyInput = document.getElementById("subtletyInput");
    const suggestivenessInput = document.getElementById("suggestivenessInput");
    const otherInput = document.getElementById("otherInput");
    const buildImagePromptButton = document.getElementById("buildImagePromptButton");

    let history = JSON.parse(localStorage.getItem("chloe_history") || "[]");
    let memory = localStorage.getItem("chloe_memory") || "";
    let personality = localStorage.getItem("chloe_personality") || "balanced";
    let lastUpgradeProposal = null;

    personalityBox.value = personality;

    personalityBox.addEventListener("change", () => {
      personality = personalityBox.value;
      localStorage.setItem("chloe_personality", personality);
      addMessage("system", "Personality changed to: " + personalityBox.options[personalityBox.selectedIndex].text);
    });

    buildImagePromptButton.addEventListener("click", () => {
      const parts = [];
      const subject = subjectInput.value.trim();
      const style = styleInput.value;
      const mood = moodInput.value;
      const subtlety = subtletyInput.value;
      const suggestiveness = suggestivenessInput.value;
      const other = otherInput.value.trim();

      if (subject) {
        parts.push(`A detailed image of ${subject}`);
      }
      if (style) {
        parts.push(`in a ${style.toLowerCase()} style`);
      }
      if (mood) {
        parts.push(`with a ${mood.toLowerCase()} mood`);
      }
      if (subtlety) {
        switch(subtlety) {
          case "low":
            parts.push(`with minimal explicit detail and subtle nuances`);
            break;
          case "medium":
            parts.push(`balancing subtle and explicit details`);
            break;
          case "high":
            parts.push(`with more explicit and detailed features`);
            break;
        }
      }
      if (suggestiveness) {
        switch(suggestiveness) {
          case "low":
            parts.push(`avoiding suggestive elements, keeping it tasteful`);
            break;
          case "medium":
            parts.push(`allowing moderate suggestiveness aligned with user preferences`);
            break;
          case "high":
            parts.push(`highlighting artistic suggestive content subtly`);
            break;
        }
      }
      if (other) {
        parts.push(other);
      }

      const prompt = parts.join(", ") + ".";
      imagePromptBox.value = prompt;
      addMessage("system", "Image prompt built: " + prompt);
    });

    function isImageIntent(text) {
      return /\b(generate|create|make|draw|picture|image|photo|artwork|illustration|render)\b/i.test(text || "");
    }

    function isUpgradeIntent(text) {
      return /\b(upgrade|improve|enhance|update|modify|change your code|edit your code|self upgrade|self-upgrade|better ui|better memory|add feature)\b/i.test(text || "");
    }

    function cleanImagePrompt(text) {
      return String(text || "")
        .replace(/can you/gi, "")
        .replace(/please/gi, "")
        .replace(/generate/gi, "")
        .replace(/create/gi, "")
        .replace(/make/gi, "")
        .replace(/draw/gi, "")
        .replace(/an image of/gi, "")
        .replace(/a picture of/gi, "")
        .replace(/image of/gi, "")
        .trim();
    }

    function saveHistory() {
      localStorage.setItem("chloe_history", JSON.stringify(history.slice(-60)));
    }

    function addMessage(role, content, imageSrc = "") {
      const div = document.createElement("div");

      div.className = "msg " + (
        role === "user" ? "user" :
        role === "system" ? "system" :
        role === "suggestion" ? "suggestion" :
        "chloe"
      );

      div.textContent = content;

      if (imageSrc) {
        const img = document.createElement("img");
        img.src = imageSrc;
        img.className = "generated-image";
        div.appendChild(img);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderHistory() {
      chat.innerHTML = "";
      history.forEach(m => addMessage(m.role, m.content, m.imageSrc || ""));
    }

    async function sendMessage() {
      const message = messageBox.value.trim();
      const imageUrl = imageBox.value.trim();

      if (!message && !imageUrl) return;

      messageBox.value = "";

      const shownMessage = imageUrl ? `${message || "Analyse this image."}\n${imageUrl}` : message;

      history.push({ role: "user", content: shownMessage });
      addMessage("user", shownMessage);
      saveHistory();

      if (!imageUrl && isImageIntent(message)) {
        const prompt = cleanImagePrompt(message) || imagePromptBox.value.trim() || message;
        await generateImageFromPrompt(prompt);
        return;
      }

      if (!imageUrl && isUpgradeIntent(message)) {
        addMessage("chloe", "I can prepare that upgrade now. Opening the upgrade panel and drafting a proposal for your approval.");
        openUpgradePanel(message);
        await proposeUpgrade(message);
        return;
      }

      statusBox.textContent = "Thinking...";

      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            imageUrl,
            memory,
            history,
            personality: personalityBox.value
          })
        });

        const data = await res.json();
        const reply = data.reply || "No reply returned.";

        if (data.intent === "image") {
          await generateImageFromPrompt(cleanImagePrompt(message) || message);
          return;
        }

        if (data.intent === "upgrade") {
          addMessage("chloe", reply);
          openUpgradePanel(message);
          await proposeUpgrade(message);
          return;
        }

        history.push({ role: "chloe", content: reply });
        addMessage("chloe", reply);
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Error: " + err.message);
        statusBox.textContent = "Offline";
      }
    }

    async function manualGenerateImage() {
      const prompt = imagePromptBox.value.trim() || messageBox.value.trim();

      if (!prompt) {
        addMessage("system", "Add an image prompt first.");
        return;
      }

      await generateImageFromPrompt(prompt);
    }

    async function generateImageFromPrompt(prompt) {
      const cleanPrompt = String(prompt || "").trim();

      if (!cleanPrompt) {
        addMessage("system", "Add an image prompt first.");
        return;
      }

      const subtlety = subtletyInput.value || "medium";
      const suggestiveness = suggestivenessInput.value || "medium";

      history.push({ role: "user", content: "Generate image: " + cleanPrompt });
      addMessage("user", "Generate image: " + cleanPrompt);
      saveHistory();

      statusBox.textContent = "Generating image...";

      try {
        const res = await fetch(IMAGE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: cleanPrompt,
            personality: personalityBox.value,
            subtlety,
            suggestiveness
          })
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        history.push({
          role: "chloe",
          content: "Image generated:",
          imageSrc: data.image
        });

        addMessage("chloe", "Image generated:", data.image);
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Image generation error: " + err.message);
        statusBox.textContent = "Online";
      }
    }

    function toggleUpgradePanel() {
      upgradePanel.style.display =
        upgradePanel.style.display === "none" || !upgradePanel.style.display
          ? "block"
          : "none";
    }

    function openUpgradePanel(requestText = "") {
      upgradePanel.style.display = "block";
      if (requestText) {
        upgradeRequestBox.value = requestText;
      }
    }

    async function suggestUpgrade() {
      statusBox.textContent = "Thinking of an upgrade...";

      try {
        const res = await fetch(SUGGEST_UPGRADE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            history,
            memory,
            personality: personalityBox.value
          })
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        const text = `Suggested upgrade: ${data.title}\n\nWhy: ${data.reason}\n\nRequest: ${data.request}`;

        addMessage("suggestion", text);
        openUpgradePanel(data.request);

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Upgrade suggestion error: " + err.message);
        statusBox.textContent = "Online";
      }
    }

    async function proposeUpgrade(optionalRequest = "") {
      const request = String(optionalRequest || upgradeRequestBox.value || "").trim();

      if (!request) {
        addMessage("system", "Describe the upgrade first.");
        return;
      }

      upgradeRequestBox.value = request;
      statusBox.textContent = "Planning upgrade...";
      upgradePreview.textContent = "Chloe is preparing an upgrade proposal...";

      try {
        const res = await fetch(PROPOSE_UPGRADE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ request })
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        lastUpgradeProposal = data;
        upgradePreview.textContent = JSON.stringify(data, null, 2);

        history.push({
          role: "chloe",
          content: "Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it."
        });

        addMessage("chloe", "Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it.");
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        upgradePreview.textContent = "Upgrade proposal error: " + err.message;
        addMessage("chloe", "Upgrade proposal error: " + err.message);
        statusBox.textContent = "Online";
      }
    }

    async function applyUpgrade() {
      if (!lastUpgradeProposal) {
        addMessage("system", "No upgrade proposal to apply.");
        return;
      }

      const ok = confirm("Approve this upgrade and commit it to GitHub?");
      if (!ok) return;

      statusBox.textContent = "Applying upgrade...";

      try {
        const res = await fetch(APPLY_UPGRADE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(lastUpgradeProposal)
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        history.push({
          role: "chloe",
          content: "Upgrade committed. Render deploy has been triggered. Refresh in a minute or two."
        });

        addMessage("chloe", "Upgrade committed. Render deploy has been triggered. Refresh in a minute or two.");
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Apply upgrade error: " + err.message);
        statusBox.textContent = "Online";
      }
    }

    function editMemory() {
      const updated = prompt("Chloe memory:", memory);

      if (updated !== null) {
        memory = updated;
        localStorage.setItem("chloe_memory", memory);
        addMessage("system", "Memory updated.");
      }
    }

    function clearChat() {
      history = [];
      saveHistory();
      renderHistory();
    }

    function exportChat() {
      const text = history.map(m => `${m.role}: ${m.content}`).join("\n\n");

      navigator.clipboard.writeText(text)
        .then(() => addMessage("system", "Chat copied to clipboard."))
        .catch(() => addMessage("system", "Could not copy chat."));
    }

    setInterval(() => {
      fetch(PING_URL).catch(() => {});
    }, 10 * 60 * 1000);

    renderHistory();
  </script>
</body>
</html>
