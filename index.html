<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe AI</title>

<style>
body { margin:0; background:#11131a; color:white; font-family:system-ui; }

header {
  padding:18px;
  font-size:28px;
  font-weight:800;
  border-bottom:1px solid #2a2d3a;
}

#chat {
  height:50vh;
  overflow-y:auto;
  padding:16px;
}

.msg {
  max-width:84%;
  margin:10px 0;
  padding:12px;
  border-radius:14px;
  white-space:pre-wrap;
}

.user { margin-left:auto; background:#8b6cff; }
.chloe { margin-right:auto; background:#252a3d; }
.system { text-align:center; color:#aaa; }

.generated-image {
  width:100%;
  border-radius:14px;
  margin-top:10px;
}

#controls {
  padding:12px;
  border-top:1px solid #2a2d3a;
  background:#151824;
}

textarea, input {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#262b3d;
  color:white;
}

button {
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#8b6cff;
  color:white;
  font-weight:700;
}
</style>
</head>

<body>

<header>Chloe AI</header>

<div id="chat"></div>

<div id="controls">
<textarea id="message" placeholder="Talk to Chloe..."></textarea>
<input id="imagePrompt" placeholder="Describe an image">

<button onclick="sendMessage()">Send</button>
<button onclick="generateImage()">Generate Image</button>
</div>

<script>
const API = "https://chloe-ai-af3m.onrender.com";

const chat = document.getElementById("chat");
const messageBox = document.getElementById("message");
const imagePromptBox = document.getElementById("imagePrompt");

let history = [];
let lastImagePrompt = "";

function addMessage(role, text, image=null) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;

  if (image) {
    const img = document.createElement("img");
    img.src = image;
    img.className = "generated-image";
    div.appendChild(img);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function isImageIntent(text) {
  return /\b(generate|create|make|draw|image|picture|photo|render)\b/i.test(text);
}

function isRetry(text) {
  return /\b(again|retry|redo|try again|one more)\b/i.test(text);
}

async function sendMessage() {
  const message = messageBox.value.trim();
  if (!message) return;

  messageBox.value = "";
  addMessage("user", message);

  // 🔁 Retry last image
  if (isRetry(message) && lastImagePrompt) {
    await generateImageFromPrompt(lastImagePrompt);
    return;
  }

  // 🎯 Detect image intent
  if (isImageIntent(message)) {
    lastImagePrompt = message;
    await generateImageFromPrompt(message);
    return;
  }

  const bubble = addMessage("chloe", "Thinking...");

  try {
    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    const reply = data.reply || "";

    bubble.textContent = reply;

    // 🔥 If Chloe says she's generating → actually do it
    if (/generating/i.test(reply) && lastImagePrompt) {
      await generateImageFromPrompt(lastImagePrompt);
    }

  } catch (err) {
    bubble.textContent = "Error: " + err.message;
  }
}

async function generateImage() {
  const prompt = imagePromptBox.value.trim();
  if (!prompt) return;

  lastImagePrompt = prompt;
  await generateImageFromPrompt(prompt);
}

async function generateImageFromPrompt(prompt) {
  addMessage("user", "Generate image: " + prompt);

  const bubble = addMessage("chloe", "Creating image...");

  try {
    const res = await fetch(API + "/generate-image", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    bubble.textContent = "Here it is 👇";

    const img = document.createElement("img");
    img.src = data.image;
    img.className = "generated-image";
    bubble.appendChild(img);

  } catch (err) {
    bubble.textContent = "Image error: " + err.message;
  }
}
</script>

</body>
</html>
