<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe AI</title>
  <style>
    body {
      margin: 0;
      background: #11131a;
      color: white;
      font-family: system-ui, sans-serif;
    }

    header {
      padding: 18px 20px;
      font-size: 30px;
      font-weight: 800;
      border-bottom: 1px solid #2a2d3a;
    }

    #status {
      float: right;
      font-size: 14px;
      background: #222638;
      padding: 8px 14px;
      border-radius: 999px;
      margin-top: 4px;
    }

    #chat {
      height: 56vh;
      overflow-y: auto;
      padding: 18px;
    }

    .msg {
      max-width: 82%;
      margin: 12px 0;
      padding: 14px 16px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
    }

    .user {
      margin-left: auto;
      background: #8b6cff;
    }

    .chloe {
      margin-right: auto;
      background: #252a3d;
    }

    .system {
      margin: 12px auto;
      background: transparent;
      color: #aaa;
      text-align: center;
      font-size: 14px;
    }

    .imageResult {
      max-width: 92%;
      border-radius: 18px;
      margin-top: 10px;
      display: block;
    }

    #controls {
      padding: 14px;
      border-top: 1px solid #2a2d3a;
      background: #151824;
    }

    textarea, input, select {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      background: #262b3d;
      color: white;
      font-size: 16px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      margin: 4px 4px 4px 0;
      background: #8b6cff;
      color: white;
      font-size: 15px;
      font-weight: 700;
    }

    button.secondary {
      background: #262b3d;
    }

    button.danger {
      background: #4b2630;
    }
  </style>
</head>

<body>
  <header>
    Chloe AI
    <span id="status">Online</span>
  </header>

  <div id="chat"></div>

  <div id="controls">
    <select id="personality">
      <option value="balanced">Balanced Chloe</option>
      <option value="warmer">Warmer Chloe</option>
      <option value="playful">Playful Chloe</option>
      <option value="technical">Technical Chloe</option>
      <option value="direct">Direct Chloe</option>
    </select>

    <textarea id="message" placeholder="Talk to Chloe..."></textarea>

    <input id="imageUrl" placeholder="Optional image URL for Chloe to analyse">
    <input id="imagePrompt" placeholder="Describe an image for Chloe to generate">

    <button onclick="sendMessage()">Send</button>
    <button onclick="generateImage()">Generate Image</button>
    <button class="secondary" onclick="editMemory()">Memory</button>
    <button class="secondary" onclick="exportChat()">Export</button>
    <button class="danger" onclick="clearChat()">Clear</button>
  </div>

  <script>
    const BACKEND_URL = "https://chloe-ai-af3m.onrender.com/chat";
    const IMAGE_URL = "https://chloe-ai-af3m.onrender.com/generate-image";
    const PING_URL = "https://chloe-ai-af3m.onrender.com/";

    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("message");
    const imageBox = document.getElementById("imageUrl");
    const imagePromptBox = document.getElementById("imagePrompt");
    const personalityBox = document.getElementById("personality");
    const statusBox = document.getElementById("status");

    let history = JSON.parse(localStorage.getItem("chloe_history") || "[]");
    let memory = localStorage.getItem("chloe_memory") || "";
    let personality = localStorage.getItem("chloe_personality") || "balanced";

    personalityBox.value = personality;

    personalityBox.addEventListener("change", () => {
      personality = personalityBox.value;
      localStorage.setItem("chloe_personality", personality);
      addMessage("system", "Personality changed to: " + personalityBox.options[personalityBox.selectedIndex].text);
    });

    function saveHistory() {
      localStorage.setItem("chloe_history", JSON.stringify(history.slice(-40)));
    }

    function addMessage(role, content, imageSrc = "") {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : role === "system" ? "system" : "chloe");
      div.textContent = content;

      if (imageSrc) {
        const img = document.createElement("img");
        img.src = imageSrc;
        img.className = "imageResult";
        div.appendChild(img);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderHistory() {
      chat.innerHTML = "";
      history.forEach(m => addMessage(m.role, m.content, m.imageSrc || ""));
    }

    async function sendMessage() {
      const message = messageBox.value.trim();
      const imageUrl = imageBox.value.trim();

      if (!message && !imageUrl) return;

      messageBox.value = "";

      const shownMessage = imageUrl ? `${message || "Analyse this image."}\n${imageUrl}` : message;

      history.push({ role: "user", content: shownMessage });
      addMessage("user", shownMessage);
      saveHistory();

      statusBox.textContent = "Thinking...";

      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            imageUrl,
            memory,
            history,
            personality: personalityBox.value
          })
        });

        const data = await res.json();
        const reply = data.reply || "No reply returned.";

        history.push({ role: "chloe", content: reply });
        addMessage("chloe", reply);
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Error: " + err.message);
        statusBox.textContent = "Offline";
      }
    }

    async function generateImage() {
      const prompt = imagePromptBox.value.trim() || messageBox.value.trim();

      if (!prompt) {
        addMessage("system", "Add an image prompt first.");
        return;
      }

      history.push({ role: "user", content: "Generate image: " + prompt });
      addMessage("user", "Generate image: " + prompt);
      saveHistory();

      statusBox.textContent = "Generating image...";

      try {
        const res = await fetch(IMAGE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt,
            personality: personalityBox.value
          })
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        history.push({
          role: "chloe",
          content: "Image generated:",
          imageSrc: data.image
        });

        addMessage("chloe", "Image generated:", data.image);
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Image generation error: " + err.message);
        statusBox.textContent = "Online";
      }
    }

    function editMemory() {
      const updated = prompt("Chloe memory:", memory);
      if (updated !== null) {
        memory = updated;
        localStorage.setItem("chloe_memory", memory);
        addMessage("system", "Memory updated.");
      }
    }

    function clearChat() {
      history = [];
      saveHistory();
      renderHistory();
    }

    function exportChat() {
      const text = history.map(m => `${m.role}: ${m.content}`).join("\n\n");
      navigator.clipboard.writeText(text)
        .then(() => addMessage("system", "Chat copied to clipboard."))
        .catch(() => addMessage("system", "Could not copy chat."));
    }

    setInterval(() => {
      fetch(PING_URL).catch(() => {});
    }, 10 * 60 * 1000);

    renderHistory();
  </script>
</body>
</html>
