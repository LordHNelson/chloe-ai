<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe AI</title>

<style>
body {
  margin:0;
  background:#11131a;
  color:white;
  font-family:system-ui, sans-serif;
}

header {
  padding:18px;
  font-size:28px;
  font-weight:800;
  border-bottom:1px solid #2a2d3a;
  position:sticky;
  top:0;
  background:#11131a;
  z-index:10;
}

#status {
  float:right;
  font-size:13px;
  background:#222638;
  padding:7px 12px;
  border-radius:999px;
}

#chat {
  height:45vh;
  overflow-y:auto;
  padding:16px;
}

.row {
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:10px 0;
}

.row.userRow {
  justify-content:flex-end;
}

.avatar {
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  background:#252a3d;
  flex-shrink:0;
  border:2px solid #8b6cff;
}

.msg {
  max-width:84%;
  padding:13px 15px;
  border-radius:16px;
  white-space:pre-wrap;
  line-height:1.45;
}

.user {
  background:#8b6cff;
}

.chloe {
  background:#252a3d;
}

.system {
  margin:12px auto;
  color:#aaa;
  text-align:center;
  font-size:14px;
}

.suggestion {
  margin:12px auto;
  background:#173b2d;
  border:1px solid #20a46b;
  color:#e9fff5;
}

.generated-image {
  width:100%;
  height:auto;
  border-radius:16px;
  margin-top:12px;
  display:block;
}

#controls {
  padding:12px;
  border-top:1px solid #2a2d3a;
  background:#151824;
}

textarea, input, select {
  width:100%;
  box-sizing:border-box;
  margin-bottom:8px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#262b3d;
  color:white;
  font-size:16px;
}

textarea {
  min-height:80px;
}

button {
  padding:11px 13px;
  margin:4px 4px 4px 0;
  border:none;
  border-radius:12px;
  background:#8b6cff;
  color:white;
  font-weight:700;
}

button.secondary {
  background:#262b3d;
}

button.danger {
  background:#4b2630;
}

button.upgrade {
  background:#20a46b;
}

#upgradePanel, #galleryPanel {
  display:none;
  border-top:1px solid #2a2d3a;
  margin-top:10px;
  padding-top:10px;
}

.galleryGrid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:12px;
}

.galleryCard {
  background:#202437;
  border-radius:14px;
  padding:8px;
  display:flex;
  flex-direction: column;
  align-items: center;
  /* Responsive container scaling to proportionally enlarge images */
  max-width: 100%;
  overflow: visible;
}

.galleryCard img {
  /* Display image at natural size but limit max width/height responsively */
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 220px;
  object-fit: contain;
  border-radius:12px;
  cursor: pointer;
  display: block;
}

.galleryPrompt {
  font-size:12px;
  color:#bbb;
  margin-top:6px;
  max-height:48px;
  overflow:hidden;
  text-align: center;
  width: 100%;
}

.badge {
  display:inline-block;
  font-size:11px;
  color:#fff;
  background:#8b6cff;
  padding:3px 7px;
  border-radius:999px;
  margin-top:6px;
}

button.galleryBtn {
  font-size: 12px;
  margin-top: 6px;
  width: 100%;
  border-radius: 10px;
  padding: 6px 0;
}

#imageModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.88);
  z-index:99;
  padding:20px;
  box-sizing:border-box;
  display: flex;
  justify-content: center;
  align-items: center;
}

#imageModal img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius:16px;
  display:block;
}

#imageModalText {
  color:#ddd;
  font-size:13px;
  margin-top:10px;
  text-align:center;
  position: absolute;
  bottom: 30px;
  width: 100%;
}

pre {
  white-space:pre-wrap;
  background:#0c0e14;
  padding:12px;
  border-radius:14px;
  max-height:260px;
  overflow-y:auto;
  font-size:13px;
}

#message.dragover {
  border: 2px dashed #8b6cff;
  background-color: #1f2150;
  outline-offset: -6px;
}
#imageDropZone {
  border: 2px dashed #8b6cff;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-bottom: 8px;
  cursor: pointer;
  user-select: none;
}
#imageDropZone.dragover {
  background-color: #1f2150;
}
#imageDropZone p {
  margin: 0;
  font-size: 14px;
  color: #bbb;
}
#errorMsg {
  color: #ff6b6b;
  margin-bottom: 8px;
  font-size: 14px;
  display: none;
}
.chatImage {
  max-width: 240px;
  max-height: 240px;
  border-radius: 14px;
  margin-top: 8px;
  cursor: pointer;
  object-fit: contain;
  display: inline-block;
}
</style>
</head>

<body>

<header>
  Chloe AI
  <span id="status">Online</span>
</header>

<div id="chat"></div>

<div id="controls">
  <select id="personality">
    <option value="balanced">Balanced Chloe</option>
    <option value="warmer">Warmer Chloe</option>
    <option value="playful">Playful Chloe</option>
    <option value="technical">Technical Chloe</option>
    <option value="direct">Direct Chloe</option>
    <option value="flirty">Flirty Chloe</option>
  </select>

  <div id="imageDropZone">Drag & drop images here or click to select</div>
  <input type="file" id="imageDropInput" accept="image/*" style="display:none" />
  <div id="errorMsg"></div>

  <textarea id="message" placeholder="Talk to Chloe..."></textarea>

  <input id="imageUrl" placeholder="Optional image URL for Chloe to analyse">
  <input id="imagePrompt" placeholder="Describe an image for Chloe to generate">

  <button onclick="sendMessage()">Send</button>
  <button onclick="manualGenerateImage()">Generate Image</button>
  <button class="secondary" onclick="toggleGallery()">Gallery</button>
  <button class="secondary" onclick="setLastImageAsAvatar()">Use Last Image as Avatar</button>
  <button class="secondary" onclick="editMemory()">Memory</button>
  <button class="secondary" onclick="loadServerMemory()">Load Memory</button>
  <button class="secondary" onclick="saveServerMemory()">Save Memory</button>
  <button class="secondary" onclick="exportChat()">Export</button>
  <button class="upgrade" onclick="toggleUpgradePanel()">Upgrade Chloe</button>
  <button class="upgrade" onclick="suggestUpgrade()">Suggest Upgrade</button>
  <button class="danger" onclick="clearChat()">Clear</button>

  <div id="galleryPanel">
    <h3>Chloe Gallery</h3>
    <button class="secondary" onclick="renderGallery()">Refresh Gallery</button>
    <button class="danger" onclick="clearGallery()">Clear Gallery</button>
    <div id="galleryGrid" class="galleryGrid"></div>
  </div>

  <div id="upgradePanel">
    <textarea id="upgradeRequest" placeholder="Describe the upgrade Chloe should make to her own code..."></textarea>
    <button class="upgrade" onclick="proposeUpgrade()">Propose Upgrade</button>
    <button class="upgrade" onclick="applyUpgrade()">Approve & Apply</button>
    <pre id="upgradePreview">No proposal yet.</pre>
  </div>
</div>

<div id="imageModal" onclick="closeImageModal()">
  <img id="imageModalImg">
  <div id="imageModalText">Tap anywhere to close</div>
</div>

<script>
const API = "https://chloe-ai-af3m.onrender.com";

const chat = document.getElementById("chat");
const messageBox = document.getElementById("message");
const imageUrlBox = document.getElementById("imageUrl");
const imagePromptBox = document.getElementById("imagePrompt");
const personalityBox = document.getElementById("personality");
const statusBox = document.getElementById("status");
const upgradePanel = document.getElementById("upgradePanel");
const upgradeRequestBox = document.getElementById("upgradeRequest");
const upgradePreview = document.getElementById("upgradePreview");
const galleryPanel = document.getElementById("galleryPanel");
const galleryGrid = document.getElementById("galleryGrid");
const imageModal = document.getElementById("imageModal");
const imageModalImg = document.getElementById("imageModalImg");
const imageModalText = document.getElementById("imageModalText");
const imageDropZone = document.getElementById("imageDropZone");
const imageDropInput = document.getElementById("imageDropInput");
const errorMsg = document.getElementById("errorMsg");

let history = loadHistory();
let memory = localStorage.getItem("chloe_memory") || "";
let personality = localStorage.getItem("chloe_personality") || "balanced";
let lastImagePrompt = localStorage.getItem("chloe_last_image_prompt") || "";
let chloeAvatar = localStorage.getItem("chloe_avatar") || "";
let lastGeneratedImage = "";
let gallery = loadGallery();
let fullImageCache = {};
let lastUpgradeProposal = null;

// Constants for drop-in image validation and optimization
const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB
const MAX_WIDTH = 2048;
const MAX_HEIGHT = 2048;

personalityBox.value = personality;

personalityBox.addEventListener("change", () => {
  personality = personalityBox.value;
  localStorage.setItem("chloe_personality", personality);
  addMessage("system", "Personality changed to: " + personalityBox.options[personalityBox.selectedIndex].text);
});

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem("chloe_history") || "[]");
  } catch {
    return [];
  }
}

function saveHistory() {
  const safeHistory = history.slice(-20).map(item => ({
    role: item.role,
    content: item.content
  }));

  history = safeHistory;

  try {
    localStorage.setItem("chloe_history", JSON.stringify(safeHistory));
  } catch {
    localStorage.removeItem("chloe_history");
    history = [];
    addMessage("system", "Storage was full, so old chat history was cleared.");
  }
}

function loadGallery() {
  try {
    return JSON.parse(localStorage.getItem("chloe_gallery") || "[]");
  } catch {
    return [];
  }
}

function saveGallery() {
  gallery = gallery.slice(-10);

  try {
    localStorage.setItem("chloe_gallery", JSON.stringify(gallery));
  } catch {
    gallery = gallery.slice(-4);
    try {
      localStorage.setItem("chloe_gallery", JSON.stringify(gallery));
    } catch {
      gallery = [];
      localStorage.removeItem("chloe_gallery");
    }
    addMessage("system", "Gallery storage was full, so Chloe reduced the gallery.");
  }
}

// Store full images in memory cache by id
async function addToGallery(prompt, image) {
  const id = Date.now();

  // Store the full image for session display
  fullImageCache[id] = image;

  // For gallery display, store just the full-resolution image URL
  gallery.push({
    id,
    prompt,
    image, // Store full resolution (data URL)
    type: "image",
    createdAt: new Date().toLocaleString()
  });

  saveGallery();
  renderGallery();
}

function toggleGallery() {
  galleryPanel.style.display =
    galleryPanel.style.display === "none" || !galleryPanel.style.display
      ? "block"
      : "none";

  renderGallery();
}

function renderGallery() {
  galleryGrid.innerHTML = "";

  if (!gallery.length) {
    galleryGrid.innerHTML = "<div class='system'>No saved images yet.</div>";
    return;
  }

  // Reverse to show latest first
  gallery.slice().reverse().forEach(item => {
    const card = document.createElement("div");
    card.className = "galleryCard";

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      img.alt = item.prompt || "Gallery Image";
      img.title = item.prompt || "Gallery Image";
      img.onload = () => {
        // Optionally override natural width/height styling if needed for sharpness
        // But here we rely on natural size with CSS limiting max size responsively
      };
      img.onclick = () => openGalleryImage(item);
      card.appendChild(img);
    }

    const badge = document.createElement("div");
    badge.className = "badge";
    badge.textContent = "IMAGE";

    const prompt = document.createElement("div");
    prompt.className = "galleryPrompt";
    prompt.textContent = item.prompt || "Untitled";

    const date = document.createElement("div");
    date.className = "galleryPrompt";
    date.textContent = item.createdAt || "";

    const avatarBtn = document.createElement("button");
    avatarBtn.className = "galleryBtn secondary";
    avatarBtn.textContent = "Set Avatar";
    avatarBtn.onclick = () => {
      const src = fullImageCache[item.id] || item.image;

      if (!src) {
        addMessage("system", "This gallery item has no stored image.");
        return;
      }

      chloeAvatar = src;
      localStorage.setItem("chloe_avatar", chloeAvatar);
      addMessage("system", "Chloe avatar updated from gallery.");
      renderHistory();
    };

    const reuseBtn = document.createElement("button");
    reuseBtn.className = "galleryBtn secondary";
    reuseBtn.textContent = "Reuse Prompt";
    reuseBtn.onclick = () => {
      imagePromptBox.value = item.prompt || "";
      addMessage("system", "Prompt copied from gallery.");
    };

    card.appendChild(badge);
    card.appendChild(prompt);
    card.appendChild(date);
    card.appendChild(avatarBtn);
    card.appendChild(reuseBtn);
    galleryGrid.appendChild(card);
  });
}

function openGalleryImage(item) {
  const src = fullImageCache[item.id] || item.image;

  if (!src) {
    addMessage("system", "This gallery item has no image to open.");
    return;
  }

  imageModalImg.src = src;
  imageModalText.textContent = "Full resolution image preview. Tap anywhere to close.";
  imageModal.style.display = "flex";
}

function closeImageModal() {
  imageModal.style.display = "none";
  imageModalImg.src = "";
}

function clearGallery() {
  const ok = confirm("Clear Chloe's gallery?");
  if (!ok) return;

  gallery = [];
  fullImageCache = {};
  localStorage.removeItem("chloe_gallery");
  renderGallery();
  addMessage("system", "Gallery cleared.");
}

function defaultAvatarSvg() {
  return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
      <rect width="100" height="100" rx="50" fill="#252a3d"/>
      <text x="50" y="58" font-size="42" text-anchor="middle" fill="#8b6cff">C</text>
    </svg>
  `);
}

function addMessage(role, text, image=null) {
  if (role === "system" || role === "suggestion") {
    const div = document.createElement("div");
    div.className = role === "suggestion" ? "msg suggestion" : "msg system";
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  const row = document.createElement("div");
  row.className = role === "user" ? "row userRow" : "row";

  if (role !== "user") {
    const avatar = document.createElement("img");
    avatar.className = "avatar";
    avatar.src = chloeAvatar || defaultAvatarSvg();
    row.appendChild(avatar);
  }

  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "chloe");

  if (image) {
    // If image is passed, insert text as well
    const textNode = document.createElement("div");
    textNode.textContent = text;
    div.appendChild(textNode);

    // Append image inline
    const img = document.createElement("img");
    img.src = image;
    img.className = "chatImage";
    img.onclick = () => {
      imageModalImg.src = image;
      imageModalText.textContent = "Full image preview. Tap anywhere to close.";
      imageModal.style.display = "flex";
    };
    div.appendChild(img);
  } else {
    div.textContent = text;
  }

  row.appendChild(div);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function typeIntoBubble(div, text) {
  div.textContent = "";
  const chunks = String(text || "").match(/.{1,4}/g) || [text];

  for (const chunk of chunks) {
    div.textContent += chunk;
    chat.scrollTop = chat.scrollHeight;
    await new Promise(r => setTimeout(r, 14));
  }
}

function renderHistory() {
  chat.innerHTML = "";

  history.forEach(m => {
    // Detect if the message contains an inline image URL pattern: [image:URL]
    const imgUrlMatch = m.content.match(/\[image:\s*(https?:\/\/[^\]]+)\]/i);
    if (imgUrlMatch) {
      const imageUrl = imgUrlMatch[1];
      // Remove the image marker from text
      const cleanText = m.content.replace(/\[image:\s*https?:\/\/[^\]]+\]/i, '').trim();

      addMessage(m.role, cleanText, imageUrl);
    } else {
      addMessage(m.role, m.content);
    }
  });
}

function rememberLastImagePrompt(prompt) {
  lastImagePrompt = prompt;
  localStorage.setItem("chloe_last_image_prompt", prompt);
}

function enhancePromptWithMotion(prompt) {
  return `
${prompt}

Style direction:
- cinematic lighting
- subtle motion cues such as wind, flowing energy, movement trails, or dynamic pose
- consistent subject
- sharp focus
- high detail
- polished composition
- safe for all audiences
- no sexual content
- no nudity
- no exposed anatomy
`;
}

function setLastImageAsAvatar() {
  if (!lastGeneratedImage) {
    addMessage("system", "No generated image available yet.");
    return;
  }

  chloeAvatar = lastGeneratedImage;
  localStorage.setItem("chloe_avatar", chloeAvatar);
  addMessage("system", "Chloe avatar updated.");
  renderHistory();
}

async function loadServerMemory() {
  statusBox.textContent = "Loading memory...";

  try {
    const res = await fetch(API + "/memory");
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    memory = data.memory || "";
    localStorage.setItem("chloe_memory", memory);

    addMessage("system", data.updatedAt ? "Persistent memory loaded. Last updated: " + data.updatedAt : "Persistent memory loaded.");
    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("system", "Memory load error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function saveServerMemory() {
  statusBox.textContent = "Saving memory...";

  try {
    const res = await fetch(API + "/memory", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ memory })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    addMessage("system", "Persistent memory saved.");
    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("system", "Memory save error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function decideAction(message) {
  const res = await fetch(API + "/decide-action", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      message,
      history,
      memory,
      personality: personalityBox.value,
      lastImagePrompt
    })
  });

  return await res.json();
}

async function sendMessage() {
  const message = messageBox.value.trim();
  const imageUrl = imageUrlBox.value.trim();

  if (!message && !imageUrl) return;

  messageBox.value = "";

  // If an imageUrl is present, include it inline in the user message with a marker
  const shownMessage = imageUrl ? `${message || "Analyse this image."}\n[image: ${imageUrl}]` : message;

  history.push({ role:"user", content:shownMessage });
  addMessage("user", shownMessage, imageUrl ? imageUrl : null);
  saveHistory();

  statusBox.textContent = "Deciding...";

  try {
    const decision = await decideAction(message || "Analyse this image.");

    if (decision.action === "image" || decision.action === "chat_and_image" || decision.action === "retry_image") {
      if (decision.reply) {
        const replyBubble = addMessage("chloe", "Thinking...");
        await typeIntoBubble(replyBubble, decision.reply);
        history.push({ role:"chloe", content:decision.reply });
        saveHistory();
      }

      const prompt =
        decision.action === "retry_image"
          ? lastImagePrompt
          : decision.imagePrompt || imagePromptBox.value.trim() || message;

      if (!prompt) {
        addMessage("system", "No image prompt available.");
        statusBox.textContent = "Online";
        return;
      }

      await generateImageFromPrompt(prompt, true);
      statusBox.textContent = "Online";
      return;
    }

    if (decision.action === "upgrade") {
      const reply = decision.reply || "I can prepare that upgrade for approval.";
      const replyBubble = addMessage("chloe", "Thinking...");
      await typeIntoBubble(replyBubble, reply);
      history.push({ role:"chloe", content:reply });
      saveHistory();

      openUpgradePanel(decision.upgradeRequest || message);
      await proposeUpgrade(decision.upgradeRequest || message);
      statusBox.textContent = "Online";
      return;
    }

    statusBox.textContent = "Thinking...";
    const bubble = addMessage("chloe", "Thinking...");

    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message,
        imageUrl,
        history,
        memory,
        personality: personalityBox.value
      })
    });

    const data = await res.json();
    const reply = data.reply || "No response returned.";

    await typeIntoBubble(bubble, reply);

    history.push({ role:"chloe", content:reply });
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function manualGenerateImage() {
  const prompt = imagePromptBox.value.trim() || messageBox.value.trim();

  if (!prompt) {
    addMessage("system", "Add an image prompt first.");
    return;
  }

  await generateImageFromPrompt(prompt, false);
}

async function generateImageFromPrompt(prompt, auto=false) {
  const cleanPrompt = String(prompt || "").trim();

  if (!cleanPrompt) {
    addMessage("system", "No image prompt available.");
    return;
  }

  rememberLastImagePrompt(cleanPrompt);

  if (auto) {
    addMessage("system", "Chloe decided a visual would help.");
  }

  addMessage("user", auto ? "Chloe visualised: " + cleanPrompt : "Generate image: " + cleanPrompt);

  statusBox.textContent = "Generating image...";
  const bubble = addMessage("chloe", "Creating image...");

  try {
    const enhancedPrompt = enhancePromptWithMotion(cleanPrompt);

    const res = await fetch(API + "/generate-image", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        prompt: enhancedPrompt,
        personality: personalityBox.value
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    bubble.textContent = auto ? "I thought this would help 👇" : "Here’s what I created 👇";

    const img = document.createElement("img");
    img.src = data.image;
    img.className = "generated-image";
    img.onclick = () => {
      imageModalImg.src = data.image;
      imageModalText.textContent = "Full image preview. Tap anywhere to close.";
      imageModal.style.display = "flex";
    };
    bubble.appendChild(img);

    lastGeneratedImage = data.image;

    await addToGallery(cleanPrompt, data.image);

    if (!chloeAvatar) {
      chloeAvatar = data.image;
      localStorage.setItem("chloe_avatar", chloeAvatar);
      addMessage("system", "Chloe avatar set from generated image.");
    }

    history.push({
      role:"chloe",
      content:auto ? "I thought this would help." : "Image generated."
    });

    saveHistory();
    statusBox.textContent = "Online";
  } catch (err) {
    bubble.textContent = "Image error: " + err.message;
    statusBox.textContent = "Online";
  }
}

function toggleUpgradePanel() {
  upgradePanel.style.display =
    upgradePanel.style.display === "none" || !upgradePanel.style.display
      ? "block"
      : "none";
}

function openUpgradePanel(requestText = "") {
  upgradePanel.style.display = "block";
  if (requestText) upgradeRequestBox.value = requestText;
}

async function suggestUpgrade() {
  statusBox.textContent = "Thinking of an upgrade...";

  try {
    const res = await fetch(API + "/suggest-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        history,
        memory,
        personality: personalityBox.value
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const text = `Suggested upgrade: ${data.title}\n\nWhy: ${data.reason}\n\nRequest: ${data.request}`;

    addMessage("suggestion", text);
    openUpgradePanel(data.request);

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Upgrade suggestion error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function proposeUpgrade(optionalRequest = "") {
  const request = String(optionalRequest || upgradeRequestBox.value || "").trim();

  if (!request) {
    addMessage("system", "Describe the upgrade first.");
    return;
  }

  upgradeRequestBox.value = request;
  statusBox.textContent = "Planning upgrade...";
  upgradePreview.textContent = "Chloe is preparing an upgrade proposal...";

  try {
    const res = await fetch(API + "/propose-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ request })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    lastUpgradeProposal = data;
    upgradePreview.textContent = JSON.stringify(data, null, 2);

    history.push({
      role:"chloe",
      content:"Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it."
    });

    addMessage("chloe", "Upgrade proposal ready. Review it, then press Approve & Apply if you want me to commit it.");
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    upgradePreview.textContent = "Upgrade proposal error: " + err.message;
    addMessage("chloe", "Upgrade proposal error: " + err.message);
    statusBox.textContent = "Online";
  }
}

async function applyUpgrade() {
  if (!lastUpgradeProposal) {
    addMessage("system", "No upgrade proposal to apply.");
    return;
  }

  const ok = confirm("Approve this upgrade and commit it to GitHub?");
  if (!ok) return;

  statusBox.textContent = "Applying upgrade...";

  try {
    const res = await fetch(API + "/apply-upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(lastUpgradeProposal)
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    history.push({
      role:"chloe",
      content:"Upgrade committed. Render deploy has been triggered. Refresh in a minute or two."
    });

    addMessage("chloe", "Upgrade committed. Render deploy has been triggered. Refresh in a minute or two.");
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    addMessage("chloe", "Apply upgrade error: " + err.message);
    statusBox.textContent = "Online";
  }
}

function editMemory() {
  const updated = prompt("Chloe memory:", memory);

  if (updated !== null) {
    memory = updated;
    localStorage.setItem("chloe_memory", memory);
    addMessage("system", "Memory updated locally. Press Save Memory to make it persistent.");
  }
}

function clearChat() {
  history = [];
  localStorage.removeItem("chloe_history");
  renderHistory();
}

function exportChat() {
  const text = history.map(m => `${m.role}: ${m.content}`).join("\n\n");

  navigator.clipboard.writeText(text)
    .then(() => addMessage("system", "Chat copied to clipboard."))

// Image drop-in support with validation and client-side optimization

// Helper: Reset error message
function resetErrorMsg() {
  errorMsg.textContent = "";
  errorMsg.style.display = "none";
}

// Validate file size and type
function validateFile(file) {
  if (!file.type.startsWith("image/")) {
    return "Only image files are allowed.";
  }
  if (file.size > MAX_FILE_SIZE) {
    return `File is too large. Max size is ${MAX_FILE_SIZE / (1024 * 1024)} MB.`;
  }
  return "";
}

// Optimize image by resizing and compressing
function optimizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => {
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;

        // Calculate new dimensions while preserving aspect ratio
        if (width > MAX_WIDTH || height > MAX_HEIGHT) {
          const ratio = Math.min(MAX_WIDTH / width, MAX_HEIGHT / height);
          width = Math.floor(width * ratio);
          height = Math.floor(height * ratio);
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // Use jpeg compression at 0.75 quality (balanced)
        canvas.toBlob((blob) => {
          if (blob) {
            const optimizedFile = new File([blob], file.name, { type: 'image/jpeg' });
            const reader2 = new FileReader();
            reader2.onload = (e2) => {
              resolve(e2.target.result);
            };
            reader2.onerror = () => reject(new Error('Optimization read error'));
            reader2.readAsDataURL(optimizedFile);
          } else {
            reject(new Error('Image compression failed'));
          }
        }, 'image/jpeg', 0.75);
      };
      img.onerror = () => reject(new Error('Invalid image file'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('File read error'));
    reader.readAsDataURL(file);
  });
}

// Handle files dropped or selected
async function handleFiles(files) {
  resetErrorMsg();
  if (!files || files.length === 0) return;

  for (const file of files) {
    const validationError = validateFile(file);
    if (validationError) {
      errorMsg.textContent = validationError;
      errorMsg.style.display = "block";
      continue;
    }

    try {
      const optimizedDataUrl = await optimizeImage(file);
      imageUrlBox.value = optimizedDataUrl;
      addMessage("system", "Image dropped and optimized loaded in the image URL box.");
      break; // only handle first valid image for now
    } catch (err) {
      errorMsg.textContent = "Image processing error: " + err.message;
      errorMsg.style.display = "block";
    }
  }
}

// Click on drop zone triggers file select
imageDropZone.addEventListener("click", () => {
  imageDropInput.value = null; // Clear previous selection
  resetErrorMsg();
  imageDropInput.click();
});

imageDropInput.addEventListener("change", (e) => {
  handleFiles(e.target.files);
});

// Drag & drop events
imageDropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  imageDropZone.classList.add("dragover");
});

imageDropZone.addEventListener("dragleave", (e) => {
  e.preventDefault();
  imageDropZone.classList.remove("dragover");
});

imageDropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  imageDropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});

// Also enhance original drag-and-drop and paste events on messageBox to support optimized image load into imageUrlBox

messageBox.addEventListener("dragover", e => {
  e.preventDefault();
  messageBox.classList.add("dragover");
});

messageBox.addEventListener("dragleave", e => {
  e.preventDefault();
  messageBox.classList.remove("dragover");
});

messageBox.addEventListener("drop", async (e) => {
  e.preventDefault();
  messageBox.classList.remove("dragover");
  await handleFiles(e.dataTransfer.files);
});

messageBox.addEventListener("paste", (e) => {
  const items = e.clipboardData.items;
  if (!items) return;

  const files = [];
  for (let i = 0; i < items.length; i++) {
    if (items[i].kind === "file") {
      const file = items[i].getAsFile();
      if (file && file.type.startsWith("image/")) {
        files.push(file);
      }
    }
  }
  if (files.length) {
    e.preventDefault();
    handleFiles(files);
  }
});

renderGallery();
loadServerMemory();
