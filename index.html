<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe AI</title>

  <style>
    body {
      margin: 0;
      background: #11131a;
      color: white;
      font-family: system-ui, sans-serif;
    }

    header {
      padding: 18px 20px;
      font-size: 30px;
      font-weight: 800;
      border-bottom: 1px solid #2a2d3a;
      background: #11131a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #status {
      float: right;
      font-size: 14px;
      background: #222638;
      padding: 8px 14px;
      border-radius: 999px;
      margin-top: 4px;
    }

    #chat {
      height: 52vh;
      overflow-y: auto;
      padding: 18px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 84%;
      margin: 12px 0;
      padding: 14px 16px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
      animation: fadeIn 0.2s ease-in-out;
    }

    .user {
      margin-left: auto;
      background: #8b6cff;
    }

    .chloe {
      margin-right: auto;
      background: #252a3d;
    }

    .system {
      margin: 12px auto;
      background: transparent;
      color: #aaa;
      text-align: center;
      font-size: 14px;
    }

    .generated-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      margin-top: 12px;
      display: block;
      object-fit: contain;
    }

    #controls {
      padding: 14px;
      border-top: 1px solid #2a2d3a;
      background: #151824;
    }

    textarea, input, select {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      background: #262b3d;
      color: white;
      font-size: 16px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      margin: 4px 4px 4px 0;
      background: #8b6cff;
      color: white;
      font-size: 15px;
      font-weight: 700;
    }

    button.secondary {
      background: #262b3d;
    }

    button.danger {
      background: #4b2630;
    }

    button.upgrade {
      background: #20a46b;
    }

    #upgradePanel {
      display: none;
      border-top: 1px solid #2a2d3a;
      padding-top: 10px;
      margin-top: 10px;
    }

    pre {
      white-space: pre-wrap;
      background: #0c0e14;
      padding: 12px;
      border-radius: 14px;
      max-height: 260px;
      overflow-y: auto;
      font-size: 13px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <header>
    Chloe AI
    <span id="status">Online</span>
  </header>

  <div id="chat"></div>

  <div id="controls">
    <select id="personality">
      <option value="balanced">Balanced Chloe</option>
      <option value="warmer">Warmer Chloe</option>
      <option value="playful">Playful Chloe</option>
      <option value="technical">Technical Chloe</option>
      <option value="direct">Direct
