<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe AI</title>

<style>
body {
  margin:0;
  background:#11131a;
  color:white;
  font-family:system-ui, sans-serif;
}

header {
  padding:18px;
  font-size:28px;
  font-weight:800;
  border-bottom:1px solid #2a2d3a;
}

#status {
  float:right;
  font-size:13px;
  background:#222638;
  padding:7px 12px;
  border-radius:999px;
}

#chat {
  height:50vh;
  overflow-y:auto;
  padding:16px;
}

.msg {
  max-width:84%;
  margin:10px 0;
  padding:13px 15px;
  border-radius:16px;
  white-space:pre-wrap;
  line-height:1.45;
}

.user {
  margin-left:auto;
  background:#8b6cff;
}

.chloe {
  margin-right:auto;
  background:#252a3d;
}

.system {
  margin:12px auto;
  color:#aaa;
  text-align:center;
  font-size:14px;
}

.typing {
  opacity:.75;
  font-style:italic;
}

.generated-image {
  width:100%;
  height:auto;
  border-radius:16px;
  margin-top:12px;
  display:block;
}

#controls {
  padding:12px;
  border-top:1px solid #2a2d3a;
  background:#151824;
}

textarea, input, select {
  width:100%;
  box-sizing:border-box;
  margin-bottom:8px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#262b3d;
  color:white;
  font-size:16px;
}

textarea {
  min-height:80px;
}

button {
  padding:11px 13px;
  margin:4px 4px 4px 0;
  border:none;
  border-radius:12px;
  background:#8b6cff;
  color:white;
  font-weight:700;
}

button.secondary {
  background:#262b3d;
}

button.danger {
  background:#4b2630;
}
</style>
</head>

<body>

<header>
  Chloe AI
  <span id="status">Online</span>
</header>

<div id="chat"></div>

<div id="controls">
  <select id="personality">
    <option value="balanced">Balanced Chloe</option>
    <option value="warmer">Warmer Chloe</option>
    <option value="playful">Playful Chloe</option>
    <option value="technical">Technical Chloe</option>
    <option value="direct">Direct Chloe</option>
    <option value="flirty">Flirty Chloe</option>
  </select>

  <textarea id="message" placeholder="Talk to Chloe..."></textarea>

  <input id="imagePrompt" placeholder="Describe an image for Chloe to generate">

  <button onclick="sendMessage()">Send</button>
  <button onclick="generateImage()">Generate Image</button>
  <button class="secondary" onclick="editMemory()">Memory</button>
  <button class="secondary" onclick="exportChat()">Export</button>
  <button class="danger" onclick="clearChat()">Clear</button>
</div>

<script>
const API = "https://chloe-ai-af3m.onrender.com";

const chat = document.getElementById("chat");
const messageBox = document.getElementById("message");
const imagePromptBox = document.getElementById("imagePrompt");
const personalityBox = document.getElementById("personality");
const statusBox = document.getElementById("status");

let history = loadHistory();
let memory = localStorage.getItem("chloe_memory") || "";
let personality = localStorage.getItem("chloe_personality") || "balanced";

personalityBox.value = personality;

personalityBox.addEventListener("change", () => {
  personality = personalityBox.value;
  localStorage.setItem("chloe_personality", personality);
  addMessage("system", "Personality changed to: " + personalityBox.options[personalityBox.selectedIndex].text);
});

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem("chloe_history") || "[]");
  } catch {
    return [];
  }
}

function saveHistory() {
  const trimmed = history.slice(-20);
  history = trimmed;

  try {
    localStorage.setItem("chloe_history", JSON.stringify(trimmed));
  } catch {
    localStorage.removeItem("chloe_history");
    history = [];
    addMessage("system", "Storage was full, so old chat history was cleared.");
  }
}

function addMessage(role, text, image=null) {
  const div = document.createElement("div");
  div.className =
    role === "user" ? "msg user" :
    role === "system" ? "msg system" :
    "msg chloe";

  div.textContent = text;

  if (image) {
    const img = document.createElement("img");
    img.src = image;
    img.className = "generated-image";
    div.appendChild(img);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function typeIntoBubble(div, text) {
  div.textContent = "";

  const chunks = text.match(/.{1,4}/g) || [text];

  for (const chunk of chunks) {
    div.textContent += chunk;
    chat.scrollTop = chat.scrollHeight;
    await new Promise(r => setTimeout(r, 18));
  }
}

function renderHistory() {
  chat.innerHTML = "";
  history.forEach(m => addMessage(m.role, m.content, m.image || null));
}

function buildMemoryContext() {
  return `
Chloe memory:
${memory || "No saved memory yet."}

Important:
Use this memory naturally when helpful, but don't repeat it unless relevant.
`;
}

function isImageIntent(text) {
  return /\b(generate|create|make|draw|picture|image|photo|artwork|illustration|render)\b/i.test(text || "");
}

function enhanceImagePrompt(prompt) {
  const personalityStyle = {
    balanced: "polished, cinematic, detailed, visually clear",
    warmer: "warm lighting, emotionally rich, inviting, soft atmosphere",
    playful: "vivid, playful, colourful, expressive, dynamic",
    technical: "clean, precise, detailed, high-resolution, technically accurate",
    direct: "simple, practical, realistic, clear composition",
    flirty: "stylish, confident, elegant, subtly seductive, tasteful, non-explicit"
  }[personalityBox.value] || "polished, cinematic, detailed";

  return `
${prompt}

Style:
${personalityStyle}

Quality:
high detail, strong composition, balanced lighting, professional finish

Safety:
tasteful, non-explicit, no nudity, no sexual content
`;
}

async function sendMessage() {
  const message = messageBox.value.trim();
  if (!message) return;

  messageBox.value = "";

  history.push({ role:"user", content:message });
  addMessage("user", message);
  saveHistory();

  if (isImageIntent(message)) {
    await generateImageFromPrompt(message);
    return;
  }

  statusBox.textContent = "Thinking...";
  const bubble = addMessage("chloe", "Chloe is thinking...");

  try {
    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: buildMemoryContext() + "\n\nJohn says:\n" + message,
        history,
        memory,
        personality: personalityBox.value
      })
    });

    const data = await res.json();
    const reply = data.reply || "No response returned.";

    await typeIntoBubble(bubble, reply);

    history.push({ role:"chloe", content:reply });
    saveHistory();

    statusBox.textContent = "Online";
  } catch (err) {
    bubble.textContent = "Error: " + err.message;
    statusBox.textContent = "Offline";
  }
}

async function generateImage() {
  const prompt = imagePromptBox.value.trim() || messageBox.value.trim();

  if (!prompt) {
    addMessage("system", "Add an image prompt first.");
    return;
  }

  await generateImageFromPrompt(prompt);
}

async function generateImageFromPrompt(prompt) {
  const enhancedPrompt = enhanceImagePrompt(prompt);

  history.push({ role:"user", content:"Generate image: " + prompt });
  addMessage("user", "Generate image: " + prompt);
  saveHistory();

  statusBox.textContent = "Generating image...";
  const bubble = addMessage("chloe", "Creating something for you...");

  try {
    const res = await fetch(API + "/generate-image", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        prompt: enhancedPrompt,
        personality: personalityBox.value
      })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error);
    }

    bubble.textContent = "Here’s what I made 👇";

    const img = document.createElement("img");
    img.src = data.image;
    img.className = "generated-image";
    bubble.appendChild(img);

    history.push({
      role:"chloe",
      content:"Image generated.",
      image:data.image
    });

    saveHistory();
    statusBox.textContent = "Online";
  } catch (err) {
    bubble.textContent = "Image error: " + err.message;
    statusBox.textContent = "Online";
  }
}

function editMemory() {
  const updated = prompt("Chloe memory:", memory);

  if (updated !== null) {
    memory = updated;
    localStorage.setItem("chloe_memory", memory);
    addMessage("system", "Memory updated.");
  }
}

function clearChat() {
  history = [];
  localStorage.removeItem("chloe_history");
  renderHistory();
}

function exportChat() {
  const text = history.map(m => `${m.role}: ${m.content}`).join("\n\n");

  navigator.clipboard.writeText(text)
    .then(() => addMessage("system", "Chat copied to clipboard."))
    .catch(() => addMessage("system", "Could not copy chat."));
}

setInterval(() => {
  fetch(API + "/").catch(() => {});
}, 10 * 60 * 1000);

renderHistory();
</script>

</body>
</html>
