<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe AI</title>
  <style>
    body {
      margin: 0;
      background: #11131a;
      color: white;
      font-family: system-ui, sans-serif;
    }

    header {
      padding: 18px;
      font-size: 28px;
      font-weight: bold;
    }

    #status {
      float: right;
      font-size: 14px;
      background: #222638;
      padding: 8px 12px;
      border-radius: 999px;
    }

    #chat {
      height: 62vh;
      overflow-y: auto;
      padding: 16px;
      border-top: 1px solid #2a2d3a;
      border-bottom: 1px solid #2a2d3a;
    }

    .msg {
      max-width: 80%;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 16px;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .user {
      margin-left: auto;
      background: #8b6cff;
    }

    .chloe {
      margin-right: auto;
      background: #242838;
    }

    #controls {
      padding: 14px;
    }

    textarea, input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      background: #262b3d;
      color: white;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      margin-right: 8px;
      background: #8b6cff;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    button.secondary {
      background: #262b3d;
    }
  </style>
</head>
<body>
  <header>
    Chloe AI
    <span id="status">Online</span>
  </header>

  <div id="chat"></div>

  <div id="controls">
    <textarea id="message" placeholder="Talk to Chloe..."></textarea>
    <input id="imageUrl" placeholder="Optional image URL for Chloe to view/analyse">
    <button onclick="sendMessage()">Send</button>
    <button class="secondary" onclick="editMemory()">Memory</button>
    <button class="secondary" onclick="clearChat()">Clear</button>
  </div>

  <script>
    const BACKEND_URL = "https://chloe-ai-af3m.onrender.com/chat";
    const PING_URL = "https://chloe-ai-af3m.onrender.com/";

    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("message");
    const imageBox = document.getElementById("imageUrl");
    const statusBox = document.getElementById("status");

    let history = JSON.parse(localStorage.getItem("chloe_history") || "[]");
    let memory = localStorage.getItem("chloe_memory") || "";

    function saveHistory() {
      localStorage.setItem("chloe_history", JSON.stringify(history.slice(-20)));
    }

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "chloe");
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderHistory() {
      chat.innerHTML = "";
      history.forEach(m => addMessage(m.role, m.content));
    }

    async function sendMessage() {
      const message = messageBox.value.trim();
      const imageUrl = imageBox.value.trim();

      if (!message) return;

      messageBox.value = "";

      history.push({ role: "user", content: message });
      addMessage("user", message);
      saveHistory();

      statusBox.textContent = "Thinking...";

      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            imageUrl,
            memory,
            history
          })
        });

        const data = await res.json();
        const reply = data.reply || "No reply returned.";

        history.push({ role: "chloe", content: reply });
        addMessage("chloe", reply);
        saveHistory();

        statusBox.textContent = "Online";
      } catch (err) {
        addMessage("chloe", "Error: " + err.message);
        statusBox.textContent = "Offline";
      }
    }

    function editMemory() {
      const updated = prompt("Chloe memory:", memory);
      if (updated !== null) {
        memory = updated;
        localStorage.setItem("chloe_memory", memory);
      }
    }

    function clearChat() {
      history = [];
      saveHistory();
      renderHistory();
    }

    // Keep Render awake while this page is open
    setInterval(() => {
      fetch(PING_URL).catch(() => {});
    }, 10 * 60 * 1000);

    renderHistory();
  </script>
</body>
</html>
